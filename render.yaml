services:
  - type: web
    name: finance-backend
    env: docker
    region: oregon
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString

databases:
  - name: finance-db
    databaseName: finance
    user: finance_admin
    plan: free
    region: oregon
